# Integration docker-compose - extends the main one with ads-service
version: "3.9"

services:
  # ========================= ADS SERVICE INFRASTRUCTURE =========================
  
  ads-db:
    image: postgres:15-alpine
    container_name: dev-ads-postgres
    environment:
      POSTGRES_USER: ads_user
      POSTGRES_PASSWORD: ads_pass
      POSTGRES_DB: ads_db
    ports:
      - "5434:5432"
    volumes:
      - ads_data:/var/lib/postgresql/data
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ads_user -d ads_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: dev-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - microservices-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: dev-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - microservices-net

  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: dev-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - microservices-net

  # ========================= ADS SERVICE =========================
  
  ads-service:
    build:
      context: ./ads-service
    container_name: dev-ads-service
    ports:
      - "8090:8090"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://ads-db:5432/ads_db
      SPRING_DATASOURCE_USERNAME: ads_user
      SPRING_DATASOURCE_PASSWORD: ads_pass
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      SPRING_AI_OLLAMA_BASE_URL: http://host.docker.internal:11434
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key_here_change_in_production}
    depends_on:
      ads-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_started
      qdrant:
        condition: service_started
    networks:
      - microservices-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  ads_data:
  qdrant_data:

networks:
  microservices-net:
    external: true
