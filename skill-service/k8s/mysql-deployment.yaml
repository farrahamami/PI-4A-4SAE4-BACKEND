apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret-skill
  namespace: devops
type: Opaque
data:
  mysql-root-password: cm9vdA==
  mysql-database: cGlkZXZfc2tpbGw=
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc-skill
  namespace: devops
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-skill
  namespace: devops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-skill
  template:
    metadata:
      labels:
        app: mysql-skill
    spec:
      automountServiceAccountToken: false   # fix: kubernetes:S6865
      containers:
        - name: mysql
          image: mysql:8.0.36              # fix: kubernetes:S6596 (tag précis au lieu de latest)
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret-skill
                  key: mysql-root-password
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mysql-secret-skill
                  key: mysql-database
          ports:
            - containerPort: 3306
          resources:                        # fix: kubernetes:S6892 / S6873 / S6864
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              memory: "1Gi"
              cpu: "1"
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: mysql-pvc-skill
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service-skill
  namespace: devops
spec:
  selector:
    app: mysql-skill
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306
  clusterIP: None