spring.application.name=commentaire-service
server.port=8083

spring.datasource.url=jdbc:mysql://localhost:3306/pidev_commentaire?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://${JAEGER_HOST:localhost}:4318/v1/traces
