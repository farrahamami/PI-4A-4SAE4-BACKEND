server.port=8090
spring.application.name=subscription-service

spring.datasource.url=jdbc:mysql://localhost:3306/pidev_subscription_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

spring.cloud.compatibility-verifier.enabled=false

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# OpenAI API
recommendation.openai.api-key=sk-METS_TA_CLE_ICI
recommendation.openai.embedding-model=text-embedding-3-small
recommendation.openai.completion-model=gpt-4-turbo
recommendation.openai.max-tokens=800
recommendation.openai.temperature=0.7

# Thresholds
recommendation.thresholds.min-confidence-to-show=30
recommendation.thresholds.high-urgency-churn-score=70
recommendation.thresholds.min-similarity-score=0.75
recommendation.thresholds.cache-expiration-hours=6

# Features
recommendation.features.use-peer-comparison=true
recommendation.features.use-churn-integration=true
recommendation.features.show-projected-roi=true