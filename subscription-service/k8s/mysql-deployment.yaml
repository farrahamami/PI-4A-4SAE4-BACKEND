apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret-subscription
  namespace: devops
type: Opaque
data:
  mysql-root-password: cm9vdA==
  mysql-database: cGlkZXZfc3Vic2NyaXB0aW9u
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc-subscription
  namespace: devops
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-subscription
  namespace: devops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-subscription
  template:
    metadata:
      labels:
        app: mysql-subscription
    spec:
      containers:
        - name: mysql
          image: mysql:8
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret-subscription
                  key: mysql-root-password
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mysql-secret-subscription
                  key: mysql-database
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: mysql-pvc-subscription
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service-subscription
  namespace: devops
spec:
  selector:
    app: mysql-subscription
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306
  clusterIP: None
