  # ========================= ADS SERVICE INFRASTRUCTURE =========================
  
  ads-db:
    image: postgres:15-alpine
    container_name: dev-ads-postgres
    environment:
      POSTGRES_USER: ads_user
      POSTGRES_PASSWORD: ads_pass
      POSTGRES_DB: ads_db
    ports:
      - "5434:5432"
    volumes:
      - ads_data:/var/lib/postgresql/data
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ads_user -d ads_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: dev-kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://kafka:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - microservices-net

  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: dev-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - microservices-net

  # ========================= ADS SERVICE =========================
  
  ads-service:
    build:
      context: ./ads-service
    container_name: dev-ads-service
    ports:
      - "8090:8090"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://ads-db:5432/ads_db
      SPRING_DATASOURCE_USERNAME: ads_user
      SPRING_DATASOURCE_PASSWORD: ads_pass
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      SPRING_AI_OLLAMA_BASE_URL: http://host.docker.internal:11434
      JWT_SECRET: super-secret-key-that-is-at-least-32-chars!
    depends_on:
      ads-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_started
      qdrant:
        condition: service_started
    networks:
      - microservices-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

# ========================= VOLUMES =========================

volumes:
  dev_mysql_data:
  ads_data:
  qdrant_data:

# ========================= NETWORK =========================

networks:
  microservices-net:
    driver: bridge