  inscription-service:
    build:
      context: ./inscription-service
    container_name: dev-inscription-service
    ports:
      - "8102:8097"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/dev_inscription?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
