version: "3.9"

services:

  # ========================= INFRASTRUCTURE =========================

  mysql:
    image: mysql:8.0
    container_name: dev-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - dev_mysql_data:/var/lib/mysql
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ========================= EUREKA =========================

  eureka-server:
    build:
      context: ./eureka-server
    container_name: dev-eureka-server
    ports:
      - "8762:8761"
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ========================= API GATEWAY =========================

  api-gateway:
    build:
      context: ./api-gateway
    container_name: dev-api-gateway
    ports:
      - "8222:8222"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_APPLICATION_NAME: user-service
      JWT_SECRET: super-secret-key-that-is-at-least-32-chars!
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - microservices-net
    restart: unless-stopped

  # ========================= USER SERVICE =========================

  user-service:
    build:
      context: ./user-service
    container_name: dev-user-service
    ports:
      - "8091:8080"
    command: ["java", "-jar", "app.jar", "--eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/", "--spring.application.name=user-service"]
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/dev_users?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect
      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: dummy@gmail.com
      SPRING_MAIL_PASSWORD: dummypassword
      GROQ_API_KEY: dummy_groq_key_for_testing
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID: dummy_client_id
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET: dummy_client_secret
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_APPLICATION_NAME: user-service
      JWT_SECRET: super-secret-key-that-is-at-least-32-chars!
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - microservices-net

  # ========================= OTHER TEAM SERVICES (not started by default) =========================

  publication-service:
