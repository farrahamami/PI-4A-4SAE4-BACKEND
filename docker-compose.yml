        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - microservices-net

  skill-service:
    build:
      context: ./skill-service
    container_name: dev-skill-service
    ports:
      - "8097:8096"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/dev_skill?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
