services:
  # ========================= INFRASTRUCTURE =========================

  mysql:
    image: mysql:8.0
    container_name: dev-mysql
    ports:
      - "3307:3306"  # port différent pour ne pas conflit avec le projet web
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - dev_mysql_data:/var/lib/mysql
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ========================= EUREKA =========================

  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: dev-eureka-server
    ports:
      - "8762:8761"  # port différent du projet web
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ========================= API GATEWAY =========================

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: dev-api-gateway
    ports:
      - "8223:8222"  # port différent du projet web
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key_here_change_in_production}
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - microservices-net
    restart: unless-stopped

  # ========================= USER SERVICE =========================

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: dev-user-service
    ports:
      - "8091:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/dev_users?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key_here_change_in_production}
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - microservices-net
    restart: unless-stopped

  # ========================= PUBLICATION SERVICE =========================

  publication-service:
    build:
      context: ./publication-service
      dockerfile: Dockerfile
    container_name: dev-publication-service
    ports:
      - "8092:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/dev_publication?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
