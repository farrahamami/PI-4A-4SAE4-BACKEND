    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/dev_event?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - microservices-net

  activity-service:
    build:
      context: ./activity-service
    container_name: dev-activity-service
    ports:
      - "8101:8093"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/dev_activity?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
