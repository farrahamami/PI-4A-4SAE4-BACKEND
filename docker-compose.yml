  project-service:
    build:
      context: ./project-service
    container_name: dev-project-service
    ports:
      - "8098:8094"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/dev_project?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
