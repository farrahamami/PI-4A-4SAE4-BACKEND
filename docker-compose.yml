  subscription-service:
    build:
      context: ./subscription-service
    container_name: dev-subscription-service
    ports:
      - "8096:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/dev_subscription?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""
      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: dummy@gmail.com
      SPRING_MAIL_PASSWORD: dummypassword
      GROQ_API_KEY: dummy_groq_key_for_testing
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID: dummy_client_id
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET: dummy_client_secret
