apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-service
  namespace: devops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-service
  template:
    metadata:
      labels:
        app: event-service
    spec:
      containers:
        - name: event-service
          image: marahmarah123/event-service:IMAGE_TAG
          ports:
            - containerPort: 8085
          imagePullPolicy: Always
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: event-mysql-secret
                  key: mysql-root-password