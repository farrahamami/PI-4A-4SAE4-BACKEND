apiVersion: apps/v1
kind: Deployment
metadata:
  name: application-service
  namespace: devops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: application-service
  template:
    metadata:
      labels:
        app: application-service
    spec:
      automountServiceAccountToken: false   # fix: kubernetes:S6865
      containers:
        - name: application-service
          image: yesmine111/application-service:latest  # fix: kubernetes:S6596
          ports:
            - containerPort: 8095
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql-service-application:3306/pidev_application?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
            - name: SPRING_DATASOURCE_USERNAME
              value: "root"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret-application
                  key: mysql-root-password
            - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
              value: "com.mysql.cj.jdbc.Driver"
            - name: SERVER_PORT
              value: "8095"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://eureka-service:8761/eureka/"
            - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
              value: "true"
          resources:                        # fix: kubernetes:S6892 / S6873 / S6864 / S6897
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              memory: "1Gi"
              cpu: "1"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8095
            initialDelaySeconds: 45
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8095
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: spring-service-application
  namespace: devops
spec:
  selector:
    app: application-service
  ports:
    - protocol: TCP
      port: 8095
      targetPort: 8095
      nodePort: 32095
  type: NodePort