services:
  ads-db:
    image: postgres:15-alpine
    container_name: ads-postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ads_db
    ports:
      - "5432:5432"
    volumes:
      - ads_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: ads-pgadmin
    restart: always
    environment:
      - PGADMIN_DEFAULT_EMAIL=fawzi-admin@pidev4sae4.com
      - PGADMIN_DEFAULT_PASSWORD=fawzi
    ports:
      - "5050:80"
    depends_on:
      - ads-db

volumes:
  ads_data: