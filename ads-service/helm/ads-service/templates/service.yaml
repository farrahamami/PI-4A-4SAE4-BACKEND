apiVersion: v1
kind: Service
metadata:
  name: ads-service
  namespace: {{ .Values.namespace }}
  labels:
    app: ads-service
spec:
  type: {{ .Values.service.type }}
  selector:
    app: ads-service
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: 8090
      {{- if eq .Values.service.type "NodePort" }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
