spring.application.name=ads-service
server.port=8090
server.servlet.context-path=/ads-service

spring.datasource.url=jdbc:postgresql://localhost:5432/ads_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

jwt.secret=super-secret-key-that-is-at-least-32-chars!

# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

spring.ai.postgresml.embedding.enabled=false
spring.ai.vectorstore.pgvector.enabled=false

# Ollama AI Configuration for Content Moderation (Shadow Mode)
spring.ai.ollama.base-url=http://localhost:11435
spring.ai.ollama.chat.options.model=llama-guard3:1b

# Disable Spring Cloud compatibility check to use Spring Boot 3.5.10
spring.cloud.compatibility-verifier.enabled=false

# Groq AI Configuration
groq.api.key=
groq.api.model=llama-3.3-70b-versatile

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092

# RAG Configuration
qdrant.url=http://localhost:6333
rag.embedding.model=nomic-embed-text
rag.llm.model=phi3:mini
rag.search.top-k=5
