spring.application.name=ads-service
server.port=8090
server.servlet.context-path=/ads-service

spring.datasource.url=jdbc:postgresql://localhost:5432/ads_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

jwt.secret=super-secret-key-that-is-at-least-32-chars!

spring.ai.postgresml.embedding.enabled=false
spring.ai.vectorstore.pgvector.enabled=false

# Ollama AI Configuration for Content Moderation (Shadow Mode)
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=llama-guard3:1b