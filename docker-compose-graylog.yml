version: '3.8'

# ═══════════════════════════════════════════════════════════════════
#  STACK GRAYLOG — Centralisation des logs des 3 microservices
#
#  Services inclus :
#    - mongodb      : stockage des métadonnées Graylog
#    - opensearch   : stockage et indexation des logs (remplace Elasticsearch)
#    - graylog      : interface web + réception GELF
#
#  Ports exposés :
#    - 9002  : Interface web Graylog  → http://localhost:9002
#    - 12201 : Input GELF UDP         → reçoit les logs des microservices
#
#  Identifiants par défaut :
#    - Login    : admin
#    - Password : admin
#
#  Commande de démarrage (une seule fois sur le serveur) :
#    docker compose -f docker-compose-graylog.yml up -d
#
#  Commande d'arrêt :
#    docker compose -f docker-compose-graylog.yml down
#
#  Commande de suppression complète (avec les volumes) :
#    docker compose -f docker-compose-graylog.yml down -v
# ═══════════════════════════════════════════════════════════════════

services:

  mongodb:
    image: mongo:6
    container_name: graylog-mongodb
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - graylog-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: graylog-opensearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - graylog-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  graylog:
    image: graylog/graylog:5.2
    container_name: graylog
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    environment:
      - GRAYLOG_PASSWORD_SECRET=somepasswordpeppersomepasswordpepper
      - GRAYLOG_ROOT_PASSWORD_SHA2=8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918
      - GRAYLOG_HTTP_EXTERNAL_URI=http://localhost:9002/
      - GRAYLOG_ELASTICSEARCH_HOSTS=http://opensearch:9200
      - GRAYLOG_MONGODB_URI=mongodb://mongodb/graylog
      - GRAYLOG_ROOT_TIMEZONE=Africa/Tunis
      - GRAYLOG_ROOT_EMAIL=admin@esprit.tn
    ports:
      - "9002:9000"
      - "12201:12201/udp"
      - "12201:12201/tcp"
    volumes:
      - graylog_data:/usr/share/graylog/data
    networks:
      - graylog-net

volumes:
  mongo_data:
    driver: local
  opensearch_data:
    driver: local
  graylog_data:
    driver: local

networks:
  graylog-net:
    driver: bridge