apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sonarqube-pvc-project
  namespace: devops
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 8Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarqube-project
  namespace: devops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonarqube-project
  template:
    metadata:
      labels:
        app: sonarqube-project
    spec:
      automountServiceAccountToken: false   # fix: kubernetes:S6865
      containers:
        - name: sonarqube
          image: sonarqube:10.4.1-community  # fix: kubernetes:S6596 (tag précis au lieu de latest)
          ports:
            - containerPort: 9000
          resources:                         # fix: kubernetes:S6892 / S6873 / S6864
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "4Gi"
              cpu: "2"
          readinessProbe:
            httpGet:
              path: /about
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 15
          volumeMounts:
            - name: sonarqube-data
              mountPath: /opt/sonarqube/data
      volumes:
        - name: sonarqube-data
          persistentVolumeClaim:
            claimName: sonarqube-pvc-project
---
apiVersion: v1
kind: Service
metadata:
  name: sonarqube-service-project
  namespace: devops
spec:
  selector:
    app: sonarqube-project
  ports:
    - protocol: TCP
      port: 9000
      targetPort: 9000
      nodePort: 32001
  type: NodePort