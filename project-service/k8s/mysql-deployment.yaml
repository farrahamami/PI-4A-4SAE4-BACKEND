apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret-project
  namespace: devops
type: Opaque
data:
  mysql-root-password: cm9vdA==           # "root" encodé en base64
  mysql-database: cGlkZXZfcHJvamVjdA==   # "pidev_project" encodé en base64
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc-project
  namespace: devops
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-project
  namespace: devops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-project
  template:
    metadata:
      labels:
        app: mysql-project
    spec:
      automountServiceAccountToken: false   # fix: kubernetes:S6865
      containers:
        - name: mysql
          image: mysql:8.0.36              # fix: kubernetes:S6596 (tag précis au lieu de latest)
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret-project
                  key: mysql-root-password
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mysql-secret-project
                  key: mysql-database
          ports:
            - containerPort: 3306
          resources:                        # fix: kubernetes:S6892 / S6873 / S6864
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              memory: "1Gi"
              cpu: "1"
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: mysql-pvc-project
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service-project
  namespace: devops
spec:
  selector:
    app: mysql-project
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306
  clusterIP: None