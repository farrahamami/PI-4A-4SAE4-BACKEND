spring.application.name=skill-service
server.port=8093

spring.datasource.url=jdbc:mysql://localhost:3306/prolance_skills?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

upload.dir=C:/Users/user/Desktop/Prolance/uploads

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

spring.mvc.cors.enabled=false
logging.level.com.esprit.skillservice=DEBUG
