spring.application.name=pidev

# DB Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/pidev_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server Configuration
server.port=8089
server.servlet.context-path=/pidev


# Dossier racine des fichiers uploadťs (relatif au rťpertoire de lancement)
file.upload-dir=C:/Users/user/Desktop/PI-4A-4SAE4-BACKEND/uploads/

# Taille max d'un fichier uploadť (ex: 10 MB)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB