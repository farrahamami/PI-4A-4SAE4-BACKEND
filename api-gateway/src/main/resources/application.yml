spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
            exposedHeaders:
              - Authorization
      routes:
        # в”Ђв”Ђ USER SERVICE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
        - id: user-service-auth
          uri: lb://user-service
          predicates: [Path=/api/auth/**]
          filters: [StripPrefix=0]

        - id: user-service-users
          uri: lb://user-service
          predicates: [Path=/users/**]
          filters: [StripPrefix=0]

        # в”Ђв”Ђ OAUTH2 в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
        - id: user-service-oauth2-callback
          uri: lb://user-service
          predicates: [Path=/login/oauth2/**]
          filters: [StripPrefix=0]

        - id: user-service-oauth2-redirect
          uri: lb://user-service
          predicates: [Path=/oauth2/**]
          filters: [StripPrefix=0]

        - id: ai-service
          uri: lb://user-service
          predicates: [Path=/api/ai/**]
          filters: [StripPrefix=0]

        # в”Ђв”Ђ USER SERVICE (API USERS) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
        - id: user-service-api-users
          uri: lb://user-service
          predicates: [Path=/api/users/**]
          filters: [StripPrefix=0]

        # в”Ђв”Ђ COMMENTAIRE SERVICE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
        - id: commentaire-service
          uri: lb://commentaire-service
          predicates: [Path=/api/commentaires/**]
          filters: [StripPrefix=0]

        # в”Ђв”Ђ REACTION SERVICE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
        - id: reaction-service
          uri: lb://reaction-service
          predicates: [Path=/api/reactions/**]
          filters: [StripPrefix=0]

        # в”Ђв”Ђ SUBSCRIPTION SERVICE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
        - id: subscription-service-plans
          uri: lb://subscription-service
          predicates: [Path=/api/subscriptions/**]
          filters: [StripPrefix=0]

        - id: subscription-service-user-subs
          uri: lb://subscription-service
          predicates: [Path=/api/user-subscriptions/**]
          filters: [StripPrefix=0]

        - id: subscription-service-stats
          uri: lb://subscription-service
          predicates: [Path=/api/stats/**]
          filters: [StripPrefix=0]

        - id: subscription-service-churn
          uri: lb://subscription-service
          predicates: [Path=/api/churn-prediction/**]
          filters: [StripPrefix=0]

        - id: subscription-service-recommendations
          uri: lb://subscription-service
          predicates: [Path=/api/recommendations/**]
          filters: [StripPrefix=0]

        # в”Ђв”Ђ PROMO SERVICE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
        - id: promo-service-promos
          uri: lb://promo-service
          predicates: [Path=/api/promos/**]
          filters: [StripPrefix=0]

        - id: promo-service-payments
          uri: lb://promo-service
          predicates: [Path=/api/payments/**]
          filters: [StripPrefix=0]

        # в”Ђв”Ђ PROJECT SERVICE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
        - id: project-service
          uri: lb://project-service
          predicates: [Path=/api/projects/**]
          filters: [StripPrefix=0]

        # в”Ђв”Ђ APPLICATION SERVICE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
        - id: application-service
          uri: lb://application-service
          predicates: [Path=/api/applications/**]
          filters: [StripPrefix=0]

        - id: application-service-uploads
          uri: lb://application-service
          predicates: [Path=/uploads/cover-letters/**]
          filters: [StripPrefix=0]

        # в”Ђв”Ђ SKILL SERVICE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
        - id: skill-service
          uri: lb://skill-service
          predicates: [Path=/api/skills/**]
          filters: [StripPrefix=0]

        - id: skill-service-uploads
          uri: lb://skill-service
          predicates: [Path=/uploads/resumes/**]
          filters: [StripPrefix=0]

        # в”Ђв”Ђ PUBLICATION SERVICE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
        - id: publication-service
          uri: lb://publication-service
          predicates: [Path=/api/publications/**]
          filters: [StripPrefix=0]

        - id: publication-uploads
          uri: lb://publication-service
          predicates: [Path=/uploads/**]
          filters: [StripPrefix=0]

        # в”Ђв”Ђ EVENT SERVICE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
        - id: event-service
          uri: lb://event-service
          predicates: [Path=/api/events/**]
          filters: [StripPrefix=0]

        - id: event-service-public
          uri: lb://event-service
          predicates: [Path=/api/public-events/**]
          filters: [StripPrefix=0]

        # в”Ђв”Ђ INSCRIPTION SERVICE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
        - id: inscription-service
          uri: lb://inscription-service
          predicates: [Path=/api/inscriptions/**]
          filters: [StripPrefix=0]

        - id: inscription-service-public
          uri: lb://inscription-service
          predicates: [Path=/api/inscriptions-public/**]
          filters: [StripPrefix=0]

        # в”Ђв”Ђ ACTIVITY SERVICE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
        - id: activity-service
          uri: lb://activity-service
          predicates: [Path=/api/activities/**]
          filters: [StripPrefix=0]

        - id: activity-service-public
          uri: lb://activity-service
          predicates: [Path=/api/activities-public/**]
          filters: [StripPrefix=0]


        # -- ADS SERVICE -----------------------------------------------
        - id: ads-service-plans
          uri: lb://ads-service
          predicates:
            - Path=/api/plans,/api/plans/**
          filters:
            - RewritePath=/api(?<segment>.*), /ads-service/api$\{segment}

        - id: ads-service-campaigns
          uri: lb://ads-service
          predicates:
            - Path=/api/campaigns,/api/campaigns/**
          filters:
            - RewritePath=/api(?<segment>.*), /ads-service/api$\{segment}

        - id: ads-service-ads
          uri: lb://ads-service
          predicates:
            - Path=/api/ads,/api/ads/**
          filters:
            - RewritePath=/api(?<segment>.*), /ads-service/api$\{segment}

        # -- ADS SERVICE — RAG ----------------------------------------
        - id: ads-service-rag
          uri: lb://ads-service
          predicates:
            - Path=/api/rag/**
          filters:
            - RewritePath=/api(?<segment>.*), /ads-service/api$\{segment}
server:
  port: 8222

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG